
#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    server {
        listen       80;
        server_name  localhost;

        #access_log  logs/host.access.log  main;

        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;

        # Set root to the workspace parent so requests map directly:
        root "C:/Users/Aditi Srivastava/Desktop/workspace/web-dev";
        index index.html myfirst.html;

        # Serve the project at path /ui-ux-first-project/
        location /ui-ux-first-project/ {
            # Files are served from: C:/Users/Aditi Srivastava/Desktop/workspace/web-dev/ui-ux-first-project/
            try_files $uri $uri/ =404;
            autoindex on;
        }

        # Serve the project at path /ui-ux-second-project/
        location /ui-ux-second-project/ {
            # Files are served from: C:/Users/Aditi Srivastava/Desktop/workspace/web-dev/ui-ux-second-project/
            try_files $uri $uri/ =404;
            autoindex on;
        }

        # Serve the project at path /ui-ux-third-project/
        location /ui-ux-third-project/ {
            # Files are served from: C:/Users/Aditi Srivastava/Desktop/workspace/web-dev/ui-ux-third-project/
            try_files $uri $uri/ =404;
            autoindex on;
        }

        # Default: return 404 for other requests
        location / {
            try_files $uri $uri/ =404;
        }
    }


